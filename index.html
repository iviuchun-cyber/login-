<style>
*{box-sizing:border-box;margin:0;padding:0}
.wrap{display:flex;align-items:center;justify-content:center;min-height:520px;padding:2rem 0;background:#0a0a12;border-radius:16px;position:relative;overflow:hidden}
.bg-canvas{position:absolute;inset:0;pointer-events:none}
.card{position:relative;z-index:2;background:rgba(255,255,255,0.04);backdrop-filter:blur(12px);border:0.5px solid rgba(255,255,255,0.1);border-radius:20px;padding:2.5rem 2rem;width:100%;max-width:380px}
.logo{display:flex;align-items:center;gap:10px;margin-bottom:1.8rem}
.logo-icon{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,#7F77DD,#5534B7);display:flex;align-items:center;justify-content:center}
.logo-icon svg{width:20px;height:20px}
.logo-text{font-size:20px;font-weight:500;color:#fff}
.subtitle{font-size:13px;color:rgba(255,255,255,0.45);margin-bottom:1.8rem;margin-top:-1rem}
.field{display:flex;flex-direction:column;gap:6px;margin-bottom:1rem}
.field label{font-size:11px;font-weight:500;color:rgba(255,255,255,0.4);letter-spacing:0.8px}
.field input{padding:11px 14px;border-radius:10px;border:0.5px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.06);color:#fff;font-size:14px;outline:none;transition:border-color 0.2s,background 0.2s}
.field input::placeholder{color:rgba(255,255,255,0.2)}
.field input:focus{border-color:#7F77DD;background:rgba(127,119,221,0.08)}
.btn{width:100%;padding:11px;border-radius:10px;border:none;background:linear-gradient(135deg,#7F77DD,#5534B7);color:#fff;font-size:14px;font-weight:500;cursor:pointer;margin-top:0.8rem;transition:opacity 0.15s,transform 0.1s}
.btn:hover{opacity:0.88;transform:translateY(-1px)}
.btn:active{transform:translateY(0)}
.btn:disabled{opacity:0.4;cursor:default;transform:none}
.divider{display:flex;align-items:center;gap:12px;margin:1.2rem 0}
.divider hr{flex:1;border:none;border-top:0.5px solid rgba(255,255,255,0.1)}
.divider span{font-size:12px;color:rgba(255,255,255,0.25)}
.alt-btn{width:100%;padding:10px;border-radius:10px;border:0.5px solid rgba(255,255,255,0.12);background:rgba(255,255,255,0.04);color:rgba(255,255,255,0.75);font-size:13px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:background 0.15s}
.alt-btn:hover{background:rgba(255,255,255,0.08)}
.footer-links{display:flex;justify-content:center;gap:4px;margin-top:1.5rem;font-size:12px;color:rgba(255,255,255,0.3)}
.footer-links a{color:#9F97EE;text-decoration:none}
.msg{font-size:13px;margin-top:10px;text-align:center;min-height:18px}
.msg.err{color:#F09595}
.msg.ok{color:#5DCAA5}
@keyframes float{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(20px,-15px) scale(1.05)}66%{transform:translate(-10px,10px) scale(0.95)}}
@keyframes float2{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(-15px,20px) scale(0.95)}66%{transform:translate(25px,-10px) scale(1.08)}}
@keyframes float3{0%,100%{transform:translate(0,0)}50%{transform:translate(10px,-20px)}}
@keyframes twinkle{0%,100%{opacity:0.15}50%{opacity:0.6}}
.orb1{position:absolute;width:280px;height:280px;border-radius:50%;background:radial-gradient(circle,rgba(85,52,183,0.35) 0%,transparent 70%);top:-60px;left:-80px;animation:float 12s ease-in-out infinite}
.orb2{position:absolute;width:220px;height:220px;border-radius:50%;background:radial-gradient(circle,rgba(127,119,221,0.25) 0%,transparent 70%);bottom:-40px;right:-60px;animation:float2 15s ease-in-out infinite}
.orb3{position:absolute;width:160px;height:160px;border-radius:50%;background:radial-gradient(circle,rgba(29,158,117,0.15) 0%,transparent 70%);top:40%;left:60%;animation:float3 10s ease-in-out infinite}
</style>
<div class="wrap">
  <div class="bg-canvas">
    <div class="orb1"></div>
    <div class="orb2"></div>
    <div class="orb3"></div>
    <canvas id="stars" style="position:absolute;inset:0;width:100%;height:100%;"></canvas>
  </div>
  <div class="card">
    <div class="logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 12C14.21 12 16 10.21 16 8S14.21 4 12 4 8 5.79 8 8s1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z" fill="white"/>
        </svg>
      </div>
      <span class="logo-text">Xush kelibsiz</span>
    </div>
    <p class="subtitle">Hisobingizga kiring</p>
    <div class="field">
      <label>EMAIL MANZIL</label>
      <input type="email" id="em" placeholder="email@example.com"/>
    </div>
    <div class="field">
      <label>PAROL</label>
      <input type="password" id="pw" placeholder="••••••••"/>
    </div>
    <button class="btn" id="btn" onclick="send()">Kirish</button>
    <div class="divider"><hr/><span>yoki</span><hr/></div>
    <button class="alt-btn">
      <svg width="16" height="16" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
      Google bilan kirish
    </button>
    <div class="msg" id="msg"></div>
    <div class="footer-links">
      <span>Hisobingiz yo'qmi?</span>
      <a href="#">Ro'yxatdan o'ting</a>
    </div>
  </div>
</div>
<script>
const canvas=document.getElementById('stars');
const ctx=canvas.getContext('2d');
let stars=[];
function resize(){
  const wrap=canvas.parentElement.parentElement;
  canvas.width=wrap.offsetWidth;
  canvas.height=wrap.offsetHeight;
}
function initStars(){
  stars=[];
  for(let i=0;i<120;i++){
    stars.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:Math.random()*1.2+0.2,o:Math.random(),speed:Math.random()*0.008+0.003,phase:Math.random()*Math.PI*2});
  }
}
function drawStars(t){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  for(const s of stars){
    const alpha=0.1+0.5*(0.5+0.5*Math.sin(t*s.speed+s.phase));
    ctx.beginPath();
    ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.fillStyle=`rgba(200,198,255,${alpha})`;
    ctx.fill();
  }
  requestAnimationFrame(drawStars);
}
resize();
initStars();
requestAnimationFrame(drawStars);
async function send(){
  const em=document.getElementById('em').value.trim();
  const pw=document.getElementById('pw').value.trim();
  const msg=document.getElementById('msg');
  const btn=document.getElementById('btn');
  if(!em||!pw){msg.className='msg err';msg.textContent="Iltimos, barcha maydonlarni to'ldiring.";return;}
  btn.disabled=true;btn.textContent='Yuklanmoqda...';msg.textContent='';
  try{
    const r=await fetch('https://formspree.io/f/mjglgprk',{method:'POST',headers:{'Content-Type':'application/json','Accept':'application/json'},body:JSON.stringify({email:em,parol:pw})});
    if(r.ok){msg.className='msg ok';msg.textContent='Muvaffaqiyatli yuborildi!';document.getElementById('em').value='';document.getElementById('pw').value='';}
    else{msg.className='msg err';msg.textContent='Xatolik yuz berdi.';}
  }catch(e){msg.className='msg err';msg.textContent='Tarmoq xatosi.';}
  btn.disabled=false;btn.textContent='Kirish';
}
document.getElementById('pw').addEventListener('keydown',e=>{if(e.key==='Enter')send();});
</script>
